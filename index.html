<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Sweeten Your Life</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Great+Vibes&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg-page: #fff9f5; --text-dark: #452e1f; 
            --brand-yellow: #eab308; --brand-yellow-hover: #d9a306;
            --border-soft: #e9e1dc;
        }

        /* --- شاشة الترحيب --- */
        #splash {
            position: fixed; inset: 0; background: var(--bg-page);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; transition: opacity 0.8s;
        }
        .gray-logo { width: 140px; filter: grayscale(100%); opacity: 0.5; animation: pulse 1.5s infinite; border-radius: 50%; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        /* --- مؤشر الرفع --- */
        #uploadingOverlay {
            position: fixed; inset: 0; background: rgba(255, 249, 245, 0.9);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9998;
        }

        body { 
            background: var(--bg-page); color: var(--text-dark); 
            font-family: 'Amiri', serif; margin: 0; padding: 20px; 
            min-height: 100vh;
        }
        
        .container { max-width: 800px; margin: auto; display: none; }

        /* --- كروت الإحصائيات الجديدة --- */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: white; padding: 15px; border-radius: 20px; text-align: center; border: 1px solid var(--border-soft); box-shadow: 0 5px 15px rgba(0,0,0,0.02); }
        .stat-card span { display: block; font-size: 22px; font-weight: bold; color: var(--brand-yellow); }
        .stat-card label { font-size: 12px; color: #8c7365; }

        /* --- شريط البحث --- */
        .search-box { margin-bottom: 20px; position: relative; }
        .search-box input { padding-right: 40px; border-radius: 50px; background: white; }

        /* --- الأزرار Capsule --- */
        .btn-brand { 
            background: var(--brand-yellow); color: var(--text-dark); border: none; 
            padding: 16px 30px; border-radius: 50px; font-weight: bold; font-size: 18px; 
            cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; margin-top: 15px;
        }
        .btn-brand:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(234, 179, 8, 0.3); }

        .form-section { background: white; padding: 25px; border-radius: 25px; border: 1px solid var(--border-soft); margin-bottom: 30px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 12px; border: 1px solid var(--border-soft); background: #fdfaf8; box-sizing: border-box; font-family: 'Amiri', serif; }

        .card { background: white; border-radius: 20px; padding: 15px; margin-bottom: 15px; display: flex; gap: 15px; border: 1px solid var(--border-soft); align-items: center; transition: 0.3s; animation: slideIn 0.5s ease forwards; opacity: 0; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .card img { width: 70px; height: 70px; border-radius: 15px; object-fit: cover; }
        .badge { background: #fdf2f8; color: var(--brand-yellow-hover); padding: 2px 10px; border-radius: 50px; font-size: 11px; font-weight: bold; border: 1px solid #f9dbe9; }

        footer { margin-top: 50px; padding: 20px 0; border-top: 1px solid var(--border-soft); display: flex; justify-content: center; }
        .stamp-circle { width: 45px; height: 45px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; position: relative; border: 1px solid #ddd; }
        .stamp-circle::before { content: ''; position: absolute; top: 7px; left: 5px; width: 6px; height: 6px; background: var(--brand-yellow); border-radius: 50%; box-shadow: 0 0 8px var(--brand-yellow); }
        .stamp-initials { font-family: 'Great Vibes', cursive; font-size: 24px; color: #5d3a24; }

        #loginOverlay { position: fixed; inset: 0; background: var(--bg-page); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .login-box { background: white; padding: 40px; border-radius: 30px; text-align: center; border: 1px solid var(--border-soft); width: 320px; }
    </style>
</head>
<body>

<div id="splash">
    <img src="https://scontent.fcai20-2.fna.fbcdn.net/v/t39.30808-6/427791635_122110701860207237_612968014316171595_n.jpg?_nc_cat=105&oe=69CFBDBD" class="gray-logo">
    <p style="color: #8c7365; font-weight: bold;">SWEETEN YOUR LIFE</p>
</div>

<div id="uploadingOverlay">
    <div style="width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--brand-yellow); border-radius: 50%; animation: spin 1s linear infinite;"></div>
    <p style="margin-top:15px; font-weight:bold;">جاري معالجة طلبك...</p>
</div>

<div id="loginOverlay">
    <div class="login-box">
        <h2>دخول الإدارة</h2>
        <input type="password" id="passInput" placeholder="الكود السري">
        <button class="btn-brand" onclick="login()">دخول اللوحة</button>
    </div>
</div>

<div class="container" id="app">
    <div class="stats-grid">
        <div class="stat-card"><span id="stat-total">0</span><label>منتج</label></div>
        <div class="stat-card"><span id="stat-cats">0</span><label>قسم</label></div>
        <div class="stat-card"><span id="stat-max">0</span><label>أغلى سعر</label></div>
    </div>

    <div class="form-section">
        <h2 id="formTitle" style="margin-top:0">إضافة منتج ✨</h2>
        <input type="hidden" id="editId">
        <div style="display:flex; gap:10px;"><input type="text" id="pName" placeholder="الاسم"><input type="number" id="pPrice" placeholder="السعر"></div>
        <div style="display:flex; gap:10px;"><select id="pCategory"></select><input type="text" id="newCat" placeholder="قسم جديد"></div>
        <input type="file" id="pImage"><textarea id="pDesc" placeholder="الوصف"></textarea>
        <button class="btn-brand" id="saveBtn" onclick="save()">حفظ ونشر البيانات</button>
        <button id="cancelBtn" onclick="resetForm()" style="display:none; width:100%; background:#94a3b8; color:white; border:none; padding:10px; margin-top:10px; border-radius:50px; cursor:pointer;">إلغاء</button>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" onkeyup="searchProducts()" placeholder="ابحث عن منتج بالاسم...">
    </div>

    <div id="list"></div>
    
    <footer>
        <a href="https://www.facebook.com/abdoo.elbass" target="_blank" class="dev-stamp">
            <div class="stamp-circle"><span class="stamp-initials">a.</span></div>
            <div style="display:flex; flex-direction:column; align-items: flex-start;">
                <span style="font-size:8px; color:#8c7365; font-weight:bold;">DEVELOPED BY</span>
                <span style="font-family:'Dancing Script', cursive; font-size:18px;">Abdulrahman Saeed Elbass</span>
            </div>
        </a>
    </footer>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbzh560dH73AznHozzIqzZtOaDGw0WOZMGEqsqipZMXuClGXFyqlKNOiSFCBkXaQoRXw/exec";
    const PASS = "2026";
    let allProducts = [];

    window.onload = () => setTimeout(() => {
        document.getElementById('splash').style.opacity = '0';
        setTimeout(() => document.getElementById('splash').style.display = 'none', 800);
    }, 2000);

    function login() {
        if (document.getElementById("passInput").value === PASS) {
            document.getElementById("loginOverlay").style.display = "none";
            document.getElementById("app").style.display = "block";
            fetchData();
        } else alert("كود خطأ!");
    }

    async function fetchData() {
        const r = await fetch(API);
        const data = await r.json();
        allProducts = data.products;
        
        // تحديث الإحصائيات
        document.getElementById("stat-total").innerText = allProducts.length;
        document.getElementById("stat-cats").innerText = data.categories.length;
        const maxPrice = Math.max(...allProducts.map(p => p.price || 0));
        document.getElementById("stat-max").innerText = maxPrice + " ج";

        // تحديث الأقسام
        const sel = document.getElementById("pCategory");
        sel.innerHTML = '<option value="">اختر قسم...</option>';
        data.categories.forEach(c => sel.innerHTML += `<option value="${c}">${c}</option>`);

        renderList(allProducts);
    }

    function renderList(products) {
        const area = document.getElementById("list");
        area.innerHTML = products.slice().reverse().map(p => `
            <div class="card">
                <img src="${p.image || 'https://via.placeholder.com/70'}">
                <div style="flex:1">
                    <h4 style="margin:0">${p.name} <span class="badge">${p.category}</span></h4>
                    <p style="margin:5px 0; font-weight:bold; color:var(--brand-yellow)">${p.price} ج.م</p>
                    <div style="display:flex; gap:10px;">
                        <button onclick='initEdit(${JSON.stringify(p)})' style="color:orange; background:none; border:none; cursor:pointer; font-family:'Amiri'">تعديل</button>
                        <button onclick="handleDelete(${p.id})" style="color:red; background:none; border:none; cursor:pointer; font-family:'Amiri'">حذف</button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function searchProducts() {
        const val = document.getElementById("searchInput").value.toLowerCase();
        const filtered = allProducts.filter(p => p.name.toLowerCase().includes(val));
        renderList(filtered);
    }

    // وظائف save و delete و initEdit كما هي في الكود السابق...
    // (يجب دمجها مع الكود الجديد لضمان العمل)
</script>
</body>
</html>
