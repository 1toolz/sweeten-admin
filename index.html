<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweeten Admin | لوحة التحكم</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #38bdf8; --success: #22c55e; --danger: #ef4444; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; display: none; }
        
        /* شاشة الدخول */
        #loginOverlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .login-box { background: var(--card); padding: 30px; border-radius: 15px; text-align: center; border: 1px solid #334155; width: 300px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        
        /* التصميم العام */
        .form-section { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #334155; margin-bottom: 30px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { cursor: pointer; border: none; border-radius: 8px; font-weight: bold; padding: 12px; transition: 0.3s; }
        .btn-main { background: var(--success); color: white; width: 100%; font-size: 16px; margin-top: 10px; }
        .btn-main:hover { opacity: 0.9; }

        .card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 12px; display: flex; gap: 15px; border: 1px solid #334155; align-items: center; }
        .card img { width: 80px; height: 80px; border-radius: 8px; object-fit: cover; background: #000; }
        .card-info { flex: 1; }
        .card-actions { display: flex; gap: 8px; margin-top: 10px; }
        .btn-edit { background: #f59e0b; color: white; flex: 1; }
        .btn-del { background: var(--danger); color: white; flex: 1; }
        
        #status { text-align: center; color: var(--primary); padding: 15px; display: none; font-weight: bold; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h2 style="color: var(--primary)">الوصول الآمن</h2>
        <p style="font-size: 13px; color: #94a3b8">أدخل الكود السري لإدارة المنتجات</p>
        <input type="password" id="passInput" placeholder="كود الدخول (مثلاً 2026)">
        <button class="btn-main" onclick="tryLogin()">دخول اللوحة</button>
    </div>
</div>

<div class="container" id="app">
    <div class="form-section">
        <h2 id="formTitle">إضافة منتج جديد ✨</h2>
        <input type="hidden" id="editId">
        
        <div style="display:flex; gap:10px;">
            <input type="text" id="pName" placeholder="اسم المنتج">
            <input type="number" id="pPrice" placeholder="السعر">
        </div>
        
        <div style="display:flex; gap:10px; align-items: center;">
            <select id="pCategory" style="flex: 1;"></select>
            <input type="text" id="newCategory" placeholder="أو اكتب قسم جديد..." style="flex: 1.5;">
        </div>
        
        <label style="font-size: 12px; color: #94a3b8;">صورة المنتج (Cloudinary):</label>
        <input type="file" id="pImage" accept="image/*">
        
        <textarea id="pDesc" rows="2" placeholder="وصف المنتج التفصيلي"></textarea>
        
        <button class="btn-main" id="saveBtn" onclick="processSave()">حفظ ونشر البيانات</button>
        <button id="cancelBtn" onclick="resetForm()" style="display:none; background:#475569; color:white; width:100%; margin-top:5px;">إلغاء التعديل</button>
    </div>

    <div id="status">جاري تحديث البيانات...</div>
    <div id="productList"></div>
</div>

<script>
    // 🔗 الرابط الجديد الخاص بك
    const API_URL = "https://script.google.com/macros/s/AKfycbzh560dH73AznHozzIqzZtOaDGw0WOZMGEqsqipZMXuClGXFyqlKNOiSFCBkXaQoRXw/exec";
    const SECRET_KEY = "2026"; // الكود السري (يمكنك تغييره هنا)
    let currentOldImg = "";

    function tryLogin() {
        if (document.getElementById("passInput").value === SECRET_KEY) {
            document.getElementById("loginOverlay").style.display = "none";
            document.getElementById("app").style.display = "block";
            loadInitialData();
        } else {
            alert("الكود غير صحيح!");
        }
    }

    async function uploadToCloudinary(file) {
        const fd = new FormData();
        fd.append("file", file);
        fd.append("upload_preset", "products_upload"); // تأكد من ضبطه Unsigned في Cloudinary
        try {
            const res = await fetch("https://api.cloudinary.com/v1_1/dw1k42gow/image/upload", { method: "POST", body: fd });
            const data = await res.json();
            return data.secure_url;
        } catch (e) {
            alert("خطأ في رفع الصورة!");
            return "";
        }
    }

    async function loadInitialData() {
        const status = document.getElementById("status");
        status.style.display = "block";
        try {
            const res = await fetch(API_URL);
            const data = await res.json();
            
            // تحديث الأقسام
            const catSel = document.getElementById("pCategory");
            catSel.innerHTML = '<option value="">اختر قسم موجود...</option>';
            data.categories.forEach(c => catSel.innerHTML += `<option value="${c}">${c}</option>`);

            // عرض المنتجات
            const list = document.getElementById("productList");
            list.innerHTML = data.products.reverse().map(p => `
                <div class="card">
                    <img src="${p.image || 'https://via.placeholder.com/80'}" onerror="this.src='https://via.placeholder.com/80'">
                    <div class="card-info">
                        <h4 style="margin:0">${p.name} <small style="color:var(--primary)">(${p.category})</small></h4>
                        <p style="margin:5px 0;">السعر: ${p.price} ج.م</p>
                        <div class="card-actions">
                            <button class="btn-edit" onclick='initEdit(${JSON.stringify(p)})'>تعديل</button>
                            <button class="btn-del" onclick="handleDelete(${p.id})">حذف</button>
                        </div>
                    </div>
                </div>
            `).join('');
        } catch (e) {
            console.error(e);
        } finally { status.style.display = "none"; }
    }

    async function processSave() {
        const btn = document.getElementById("saveBtn");
        const id = document.getElementById("editId").value;
        const file = document.getElementById("pImage").files[0];
        const finalCategory = document.getElementById("newCategory").value || document.getElementById("pCategory").value;

        if (!document.getElementById("pName").value || !finalCategory) {
            return alert("الاسم والقسم مطلوبان!");
        }

        btn.disabled = true;
        btn.innerText = "جاري الحفظ...";

        let finalImageUrl = currentOldImg;
        if (file) {
            finalImageUrl = await uploadToCloudinary(file);
        }

        const payload = {
            action: id ? "edit" : "add",
            id: id,
            name: document.getElementById("pName").value,
            price: document.getElementById("pPrice").value,
            category: finalCategory,
            image: finalImageUrl,
            description: document.getElementById("pDesc").value
        };

        try {
            await fetch(API_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) });
            alert("تم الحفظ بنجاح!");
            resetForm();
            loadInitialData();
        } catch (e) {
            alert("حدث خطأ أثناء الحفظ");
        } finally {
            btn.disabled = false;
            btn.innerText = "حفظ ونشر البيانات";
        }
    }

    function initEdit(p) {
        document.getElementById("formTitle").innerText = "تعديل: " + p.name;
        document.getElementById("editId").value = p.id;
        document.getElementById("pName").value = p.name;
        document.getElementById("pPrice").value = p.price;
        document.getElementById("pCategory").value = p.category;
        document.getElementById("pDesc").value = p.description;
        currentOldImg = p.image;
        document.getElementById("cancelBtn").style.display = "block";
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function handleDelete(id) {
        if (!confirm("هل تريد حذف هذا المنتج نهائياً من الشيت؟")) return;
        await fetch(`${API_URL}?action=delete&id=${id}`);
        loadInitialData();
    }

    function resetForm() {
        document.getElementById("formTitle").innerText = "إضافة منتج جديد ✨";
        document.getElementById("editId").value = "";
        document.getElementById("cancelBtn").style.display = "none";
        ["pName", "pPrice", "newCategory", "pDesc", "pImage"].forEach(f => document.getElementById(f).value = "");
        currentOldImg = "";
    }
</script>
</body>
</html>
