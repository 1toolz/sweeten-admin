<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweeten Admin | Abdulrahman Elbass</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Great+Vibes&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg: #0f172a; 
            --card: #1e293b; 
            --primary: #38bdf8; 
            --success: #22c55e; 
            --danger: #ef4444; 
            --text: #f8fafc; 
            --stamp-gold: #c5a044; /* اللون الذهبي للنقطة في الختم */
            --stamp-brown: #5d3a24; /* لون الخط البني الداكن */
            --stamp-bg: #fff9f5;
        }

        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 20px; padding-bottom: 80px; }
        .container { max-width: 800px; margin: auto; display: none; }
        
        /* تصميم الختم الاحترافي */
        .dev-stamp {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            padding: 10px;
            border-bottom: 1px solid #334155;
        }

        .stamp-circle {
            width: 60px;
            height: 60px;
            background: var(--stamp-bg);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(0,0,0,0.05);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            position: relative;
        }

        /* النقطة المضيئة في الختم */
        .stamp-circle::before {
            content: '';
            position: absolute;
            top: 10px;
            left: 5px;
            width: 8px;
            height: 8px;
            background: var(--stamp-gold);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--stamp-gold);
        }

        .stamp-initials {
            font-family: 'Great Vibes', cursive;
            font-size: 32px;
            color: var(--stamp-brown);
            margin-top: -5px;
        }

        .dev-name-box {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .dev-by {
            font-size: 10px;
            letter-spacing: 2px;
            color: #94a3b8;
            font-weight: bold;
        }

        .dev-full-name {
            font-family: 'Dancing Script', cursive;
            font-size: 22px;
            color: var(--text);
            background: linear-gradient(45deg, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* باقي تنسيقات اللوحة كما هي */
        .form-section { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #334155; margin-bottom: 30px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { cursor: pointer; border: none; border-radius: 8px; font-weight: bold; padding: 12px; }
        .btn-main { background: var(--success); color: white; width: 100%; font-size: 16px; margin-top: 10px; }
        #loginOverlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .login-box { background: var(--card); padding: 30px; border-radius: 15px; text-align: center; border: 1px solid #334155; width: 300px; }
        .card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 12px; display: flex; gap: 15px; border: 1px solid #334155; align-items: center; }
        .card img { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h2 style="color: var(--primary)">لوحة الإدارة</h2>
        <input type="password" id="passInput" placeholder="كود الدخول">
        <button class="btn-main" onclick="tryLogin()">دخول</button>
    </div>
</div>

<div class="container" id="app">
    
    <a href="https://www.facebook.com/abdoo.elbass" target="_blank" style="text-decoration: none;">
        <div class="dev-stamp">
            <div class="stamp-circle">
                <span class="stamp-initials">a.</span>
            </div>
            <div class="dev-name-box">
                <span class="dev-by">DEV BY</span>
                <span class="dev-full-name">Abdulrahman Saeed Elbass</span>
            </div>
        </div>
    </a>

    <div class="form-section">
        <h2 id="formTitle" style="font-size: 18px;">إضافة منتج جديد</h2>
        <input type="hidden" id="editId">
        <div style="display:flex; gap:10px;">
            <input type="text" id="pName" placeholder="اسم المنتج">
            <input type="number" id="pPrice" placeholder="السعر">
        </div>
        <div style="display:flex; gap:10px;">
            <select id="pCategory"></select>
            <input type="text" id="newCategory" placeholder="قسم جديد">
        </div>
        <input type="file" id="pImage">
        <textarea id="pDesc" rows="2" placeholder="الوصف"></textarea>
        <button class="btn-main" id="saveBtn" onclick="processSave()">حفظ ونشر</button>
    </div>

    <div id="productList"></div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzh560dH73AznHozzIqzZtOaDGw0WOZMGEqsqipZMXuClGXFyqlKNOiSFCBkXaQoRXw/exec";
    const SECRET = "2026";
    let oldImg = "";

    function tryLogin() {
        if (document.getElementById("passInput").value === SECRET) {
            document.getElementById("loginOverlay").style.display = "none";
            document.getElementById("app").style.display = "block";
            loadData();
        } else alert("خطأ!");
    }

    async function loadData() {
        const res = await fetch(API_URL);
        const data = await res.json();
        const catSel = document.getElementById("pCategory");
        catSel.innerHTML = '<option value="">اختر قسم...</option>';
        data.categories.forEach(c => catSel.innerHTML += `<option value="${c}">${c}</option>`);
        const list = document.getElementById("productList");
        list.innerHTML = data.products.reverse().map(p => `
            <div class="card">
                <img src="${p.image || 'https://via.placeholder.com/60'}">
                <div style="flex:1">
                    <h4 style="margin:0">${p.name}</h4>
                    <p style="margin:5px 0; color:var(--primary)">${p.price} ج.م</p>
                    <button onclick='initEdit(${JSON.stringify(p)})' style="background:#f59e0b; color:white; padding:5px 10px; font-size:12px; border-radius:4px;">تعديل</button>
                </div>
            </div>
        `).join('');
    }

    // ملاحظة: وظائف processSave و uploadToCloudinary تبقى كما هي من الكود السابق
</script>
</body>
</html>
