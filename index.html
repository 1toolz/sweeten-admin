<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweeten Admin | Abdulrahman Saeed Elbass</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#eab308">
    <meta name="mobile-web-app-capable" content="yes">

    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Great+Vibes&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg-page: #fff9f5; 
            --text-dark: #452e1f; 
            --brand-yellow: #eab308; /* اللون الأصفر من الصورة */
            --brand-yellow-hover: #d9a306;
            --border-soft: #e9e1dc;
        }

        /* --- شاشة الترحيب --- */
        #splash {
            position: fixed; inset: 0; background: var(--bg-page);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; transition: opacity 0.8s;
        }
        .gray-logo { width: 120px; filter: grayscale(100%); opacity: 0.5; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        /* --- مؤشر الرفع بملء الشاشة --- */
        #uploadingOverlay {
            position: fixed; inset: 0; background: rgba(255, 249, 245, 0.9);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9998;
        }

        body { 
            background: var(--bg-page); color: var(--text-dark); 
            font-family: 'Amiri', serif; margin: 0; padding: 20px; 
            min-height: 100vh; display: flex; flex-direction: column; 
        }
        
        .container { max-width: 800px; margin: auto; display: none; width: 100%; flex: 1; }

        /* --- تصميم الأزرار المطابق للصورة (Capsule) --- */
        .btn-brand { 
            background: var(--brand-yellow); 
            color: var(--text-dark); 
            border: none; 
            padding: 15px 35px; 
            border-radius: 50px; /* شكل الكبسولة */
            font-weight: bold; 
            font-size: 18px; 
            cursor: pointer; 
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(234, 179, 8, 0.2);
            width: 100%;
            margin-top: 15px;
            font-family: 'Amiri', serif;
        }
        .btn-brand:hover { background: var(--brand-yellow-hover); transform: translateY(-2px); }
        .btn-brand svg { width: 20px; height: 20px; }

        /* --- تنسيقات الفورم واللوحة --- */
        #loginOverlay { position: fixed; inset: 0; background: var(--bg-page); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .login-box { background: white; padding: 40px; border-radius: 25px; text-align: center; border: 1px solid var(--border-soft); width: 320px; box-shadow: 0 15px 40px rgba(0,0,0,0.05); }
        
        .form-section { background: white; padding: 25px; border-radius: 25px; border: 1px solid var(--border-soft); margin-bottom: 30px; }
        input, select, textarea { 
            width: 100%; padding: 14px; margin: 10px 0; border-radius: 15px; 
            border: 1px solid var(--border-soft); background: #fdfaf8; 
            box-sizing: border-box; font-family: 'Amiri', serif; font-size: 16px; 
        }

        .card { background: white; border-radius: 20px; padding: 15px; margin-bottom: 12px; display: flex; gap: 15px; border: 1px solid var(--border-soft); align-items: center; }
        .card img { width: 70px; height: 70px; border-radius: 15px; object-fit: cover; }
        .card-actions { display: flex; gap: 8px; }
        .btn-action { padding: 6px 15px; border-radius: 10px; font-size: 13px; border: 1px solid #ddd; cursor: pointer; background: #fff; }

        /* --- الختم في الأسفل --- */
        footer { margin-top: 50px; padding: 20px 0; border-top: 1px solid var(--border-soft); display: flex; justify-content: center; }
        .dev-stamp { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .stamp-circle { width: 45px; height: 45px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; position: relative; border: 1px solid #ddd; }
        .stamp-initials { font-family: 'Great Vibes', cursive; font-size: 24px; color: #5d3a24; margin-top: -4px; }
        .dev-full-name { font-family: 'Dancing Script', cursive; font-size: 19px; color: var(--text-dark); font-weight: bold; }

        /* Spinner */
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--brand-yellow); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="splash">
    <img src="https://scontent.fcai20-2.fna.fbcdn.net/v/t39.30808-6/427791635_122110701860207237_612968014316171595_n.jpg?_nc_cat=105&oe=69CFBDBD" class="gray-logo">
    <p style="color: #8c7365; font-weight: bold;">SWEETEN YOUR LIFE</p>
</div>

<div id="uploadingOverlay">
    <div class="spinner"></div>
    <p style="margin-top:15px; font-weight:bold;">جاري الحفظ والنشر...</p>
</div>

<div id="loginOverlay">
    <div class="login-box">
        <h2 style="margin-bottom:20px;">دخول المشرف</h2>
        <input type="password" id="passInput" placeholder="الكود السري">
        <button class="btn-brand" onclick="login()">
            دخول اللوحة
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M13.8 12H3"/></svg>
        </button>
    </div>
</div>

<div class="container" id="app">
    <div class="form-section">
        <h2 id="formTitle" style="margin-top:0">إضافة منتج جديد ✨</h2>
        <input type="hidden" id="editId">
        
        <div style="display:flex; gap:10px;">
            <input type="text" id="pName" placeholder="اسم المنتج">
            <input type="number" id="pPrice" placeholder="السعر">
        </div>
        
        <div style="display:flex; gap:10px; align-items: center;">
            <select id="pCategory" style="flex:1"></select>
            <input type="text" id="newCat" placeholder="أو قسم جديد..." style="flex:1">
        </div>
        
        <input type="file" id="pImage" accept="image/*">
        <textarea id="pDesc" rows="2" placeholder="وصف المنتج"></textarea>
        
        <button class="btn-brand" id="saveBtn" onclick="save()">
            <span>حفظ ونشر البيانات</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
        <button id="cancelBtn" onclick="resetForm()" style="display:none; width:100%; background:#94a3b8; color:white; border:none; padding:10px; margin-top:10px; border-radius:50px; cursor:pointer;">إلغاء التعديل</button>
    </div>

    <div id="status" style="text-align:center; padding:10px; display:none; color:#8c7365;">جاري التحديث...</div>
    <div id="list"></div>
    
    <footer>
        <a href="https://www.facebook.com/abdoo.elbass" target="_blank" class="dev-stamp">
            <div class="stamp-circle"><span class="stamp-initials">a.</span></div>
            <div style="display:flex; flex-direction:column; align-items: flex-start;">
                <span style="font-size:8px; color:#8c7365; font-weight:bold;">DEVELOPED BY</span>
                <span class="dev-full-name">Abdulrahman Saeed Elbass</span>
            </div>
        </a>
    </footer>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbzh560dH73AznHozzIqzZtOaDGw0WOZMGEqsqipZMXuClGXFyqlKNOiSFCBkXaQoRXw/exec";
    const PASS = "2026";
    let lastImg = "";

    window.onload = () => {
        setTimeout(() => {
            document.getElementById('splash').style.opacity = '0';
            setTimeout(() => document.getElementById('splash').style.display = 'none', 800);
        }, 2000);
    };

    function login() {
        if (document.getElementById("passInput").value === PASS) {
            document.getElementById("loginOverlay").style.display = "none";
            document.getElementById("app").style.display = "block";
            fetchData();
        } else alert("كود خاطئ!");
    }

    async function uploadCloudinary(file) {
        const fd = new FormData();
        fd.append("file", file);
        fd.append("upload_preset", "products_upload");
        const res = await fetch("https://api.cloudinary.com/v1_1/dw1k42gow/image/upload", {method:"POST", body:fd});
        const d = await res.json();
        return d.secure_url;
    }

    async function fetchData() {
        document.getElementById("status").style.display = "block";
        try {
            const r = await fetch(API);
            const data = await r.json();
            const sel = document.getElementById("pCategory");
            sel.innerHTML = '<option value="">اختر قسم...</option>';
            data.categories.forEach(c => sel.innerHTML += `<option value="${c}">${c}</option>`);

            const area = document.getElementById("list");
            area.innerHTML = data.products.reverse().map(p => `
                <div class="card">
                    <img src="${p.image || 'https://via.placeholder.com/70'}">
                    <div style="flex:1">
                        <h4 style="margin:0">${p.name} <small style="color:var(--brand-yellow-hover)">(${p.category})</small></h4>
                        <p style="margin:5px 0; font-weight:bold;">${p.price} ج.م</p>
                        <div class="card-actions">
                            <button class="btn-action" style="color:orange" onclick='initEdit(${JSON.stringify(p)})'>تعديل</button>
                            <button class="btn-action" style="color:red" onclick="handleDelete(${p.id})">حذف</button>
                        </div>
                    </div>
                </div>
            `).join('');
        } finally { document.getElementById("status").style.display = "none"; }
    }

    async function save() {
        const overlay = document.getElementById("uploadingOverlay");
        const id = document.getElementById("editId").value;
        const file = document.getElementById("pImage").files[0];
        const cat = document.getElementById("newCat").value || document.getElementById("pCategory").value;

        if (!document.getElementById("pName").value || !cat) return alert("اكمل البيانات");

        overlay.style.display = "flex";

        try {
            let imgUrl = lastImg;
            if (file) imgUrl = await uploadCloudinary(file);

            const payload = {
                action: id ? "edit" : "add",
                id: id,
                name: document.getElementById("pName").value,
                price: document.getElementById("pPrice").value,
                category: cat,
                image: imgUrl,
                description: document.getElementById("pDesc").value
            };

            await fetch(API, {method:"POST", mode:"no-cors", body:JSON.stringify(payload)});
            alert("تم بنجاح!");
            resetForm(); fetchData();
        } catch(e) { alert("خطأ في الاتصال"); }
        finally { overlay.style.display = "none"; }
    }

    function initEdit(p) {
        document.getElementById("formTitle").innerText = "تعديل: " + p.name;
        document.getElementById("editId").value = p.id;
        document.getElementById("pName").value = p.name;
        document.getElementById("pPrice").value = p.price;
        document.getElementById("pCategory").value = p.category;
        document.getElementById("pDesc").value = p.description;
        lastImg = p.image;
        document.getElementById("cancelBtn").style.display = "block";
        document.getElementById("saveBtn").querySelector('span').innerText = "تحديث البيانات";
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    async function handleDelete(id) {
        if (!confirm("حذف نهائي؟")) return;
        document.getElementById("uploadingOverlay").style.display = "flex";
        await fetch(`${API}?action=delete&id=${id}`);
        fetchData();
        document.getElementById("uploadingOverlay").style.display = "none";
    }

    function resetForm() {
        document.getElementById("formTitle").innerText = "إضافة منتج جديد ✨";
        document.getElementById("editId").value = "";
        document.getElementById("cancelBtn").style.display = "none";
        document.getElementById("saveBtn").querySelector('span').innerText = "حفظ ونشر البيانات";
        ["pName", "pPrice", "newCat", "pDesc", "pImage"].forEach(i => document.getElementById(i).value = "");
        lastImg = "";
    }
</script>
</body>
</html>
