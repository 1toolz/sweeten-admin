<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweeten Admin | Abdulrahman Saeed Elbass</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #0f172a; --card: #1e293b; --primary: #38bdf8; 
            --success: #22c55e; --danger: #ef4444; --text: #f8fafc; 
            --stamp-gold: #c5a044; --stamp-brown: #5d3a24; 
        }
        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            margin: 0; padding: 20px; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .container { max-width: 800px; margin: auto; display: none; width: 100%; flex: 1; }
        
        /* التنسيقات العامة */
        .form-section { background: var(--card); padding: 25px; border-radius: 15px; border: 1px solid #334155; margin-bottom: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { cursor: pointer; border: none; border-radius: 8px; font-weight: bold; padding: 12px; transition: 0.3s; }
        .btn-main { background: var(--success); color: white; width: 100%; font-size: 16px; margin-top: 10px; }
        
        .card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 12px; display: flex; gap: 15px; border: 1px solid #334155; align-items: center; }
        .card img { width: 75px; height: 75px; border-radius: 8px; object-fit: cover; background: #000; }
        .card-info { flex: 1; }
        .card-actions { display: flex; gap: 10px; margin-top: 8px; }
        .btn-edit { background: #f59e0b; color: white; flex: 1; font-size: 13px; }
        .btn-del { background: var(--danger); color: white; flex: 1; font-size: 13px; }
        
        #loginOverlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .login-box { background: var(--card); padding: 35px; border-radius: 15px; text-align: center; border: 1px solid #334155; width: 300px; }
        #status { text-align: center; color: var(--primary); display: none; padding: 10px; font-weight: bold; }

        /* --- تصميم الختم في أسفل الصفحة (Footer) --- */
        footer {
            margin-top: 50px;
            padding: 20px 0;
            border-top: 1px solid #334155;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .dev-stamp { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            text-decoration: none; 
            opacity: 0.9;
            transition: 0.3s;
        }
        .dev-stamp:hover { opacity: 1; transform: scale(1.02); }

        .stamp-circle { 
            width: 45px; height: 45px; 
            background: #fff9f5; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            position: relative; 
            border: 1px solid #ddd; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.3); 
        }
        .stamp-circle::before { 
            content: ''; position: absolute; 
            top: 6px; left: 4px; 
            width: 6px; height: 6px; 
            background: var(--stamp-gold); 
            border-radius: 50%; 
            box-shadow: 0 0 8px var(--stamp-gold); 
        }
        .stamp-initials { 
            font-family: 'Great Vibes', cursive; 
            font-size: 24px; 
            color: var(--stamp-brown); 
            margin-top: -3px; 
        }
        .dev-name-box { display: flex; flex-direction: column; align-items: flex-start; }
        .dev-by { font-size: 8px; letter-spacing: 2px; color: #94a3b8; font-weight: bold; }
        .dev-full-name { 
            font-family: 'Dancing Script', cursive; 
            font-size: 18px; 
            color: #f8fafc; 
            background: linear-gradient(45deg, #fff, var(--primary)); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h2 style="color:var(--primary)">لوحة إدارة المتجر</h2>
        <input type="password" id="passInput" placeholder="كود الدخول السري">
        <button class="btn-main" onclick="checkLogin()">دخول اللوحة</button>
    </div>
</div>

<div class="container" id="adminApp">
    
    <div class="form-section">
        <h2 id="formTitle" style="margin-top:0">إضافة منتج جديد ✨</h2>
        <input type="hidden" id="editId">
        <div style="display:flex; gap:10px;">
            <input type="text" id="pName" placeholder="اسم المنتج">
            <input type="number" id="pPrice" placeholder="السعر">
        </div>
        <div style="display:flex; gap:10px;">
            <select id="pCategory"></select>
            <input type="text" id="newCat" placeholder="أو قسم جديد...">
        </div>
        <input type="file" id="pImage" accept="image/*">
        <textarea id="pDesc" rows="2" placeholder="وصف المنتج التفصيلي"></textarea>
        <button class="btn-main" id="saveBtn" onclick="handleSave()">حفظ ونشر البيانات</button>
        <button id="cancelBtn" onclick="resetForm()" style="display:none; background:#475569; color:white; width:100%; margin-top:5px;">إلغاء التعديل</button>
    </div>

    <div id="status">جاري تحديث البيانات...</div>
    <div id="productList"></div>

    <footer>
        <a href="https://www.facebook.com/abdoo.elbass" target="_blank" class="dev-stamp">
            <div class="stamp-circle"><span class="stamp-initials">a.</span></div>
            <div class="dev-name-box">
                <span class="dev-by">DEV BY</span>
                <span class="dev-full-name">Abdulrahman Saeed Elbass</span>
            </div>
        </a>
    </footer>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbzh560dH73AznHozzIqzZtOaDGw0WOZMGEqsqipZMXuClGXFyqlKNOiSFCBkXaQoRXw/exec";
    const PASS = "2026";
    let lastImageUrl = "";

    function checkLogin() {
        if (document.getElementById("passInput").value === PASS) {
            document.getElementById("loginOverlay").style.display = "none";
            document.getElementById("adminApp").style.display = "block";
            fetchData();
        } else { alert("الكود غير صحيح!"); }
    }

    async function uploadToCloudinary(file) {
        const fd = new FormData();
        fd.append("file", file);
        fd.append("upload_preset", "products_upload");
        const res = await fetch("https://api.cloudinary.com/v1_1/dw1k42gow/image/upload", {method:"POST", body:fd});
        const d = await res.json();
        return d.secure_url;
    }

    async function fetchData() {
        document.getElementById("status").style.display = "block";
        const r = await fetch(API);
        const data = await r.json();
        
        const sel = document.getElementById("pCategory");
        sel.innerHTML = '<option value="">اختر قسم...</option>';
        data.categories.forEach(c => sel.innerHTML += `<option value="${c}">${c}</option>`);

        const area = document.getElementById("productList");
        area.innerHTML = data.products.reverse().map(p => `
            <div class="card">
                <img src="${p.image || ''}" onerror="this.src='https://via.placeholder.com/75'">
                <div class="card-info">
                    <h4 style="margin:0">${p.name} <small style="color:var(--primary)">(${p.category})</small></h4>
                    <p style="margin:5px 0;">السعر: ${p.price} ج.م</p>
                    <div class="card-actions">
                        <button class="btn-edit" onclick='initEdit(${JSON.stringify(p)})'>تعديل</button>
                        <button class="btn-del" onclick="handleDelete(${p.id})">حذف</button>
                    </div>
                </div>
            </div>
        `).join('');
        document.getElementById("status").style.display = "none";
    }

    async function handleSave() {
        const btn = document.getElementById("saveBtn");
        const id = document.getElementById("editId").value;
        const file = document.getElementById("pImage").files[0];
        const category = document.getElementById("newCat").value || document.getElementById("pCategory").value;

        if (!document.getElementById("pName").value || !category) return alert("اكمل البيانات الأساسية!");

        btn.disabled = true; btn.innerText = "جاري الحفظ...";

        try {
            let img = lastImageUrl;
            if (file) img = await uploadToCloudinary(file);

            const payload = {
                action: id ? "edit" : "add",
                id: id,
                name: document.getElementById("pName").value,
                price: document.getElementById("pPrice").value,
                category: category,
                image: img,
                description: document.getElementById("pDesc").value
            };

            await fetch(API, {method:"POST", mode:"no-cors", body:JSON.stringify(payload)});
            alert("تم الحفظ بنجاح!");
            resetForm(); fetchData();
        } catch(e) {
            alert("حدث خطأ في الاتصال");
        } finally { btn.disabled = false; btn.innerText = "حفظ ونشر البيانات"; }
    }

    function initEdit(p) {
        document.getElementById("formTitle").innerText = "تعديل: " + p.name;
        document.getElementById("editId").value = p.id;
        document.getElementById("pName").value = p.name;
        document.getElementById("pPrice").value = p.price;
        document.getElementById("pCategory").value = p.category;
        document.getElementById("pDesc").value = p.description;
        lastImageUrl = p.image;
        document.getElementById("cancelBtn").style.display = "block";
        document.getElementById("saveBtn").innerText = "تحديث المنتج";
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    async function handleDelete(rowId) {
        if (!confirm("هل تريد حذف هذا المنتج نهائياً من الشيت؟")) return;
        await fetch(`${API}?action=delete&id=${rowId}`);
        fetchData();
    }

    function resetForm() {
        document.getElementById("formTitle").innerText = "إضافة منتج جديد ✨";
        document.getElementById("editId").value = "";
        document.getElementById("saveBtn").innerText = "حفظ ونشر البيانات";
        document.getElementById("saveBtn").disabled = false;
        document.getElementById("cancelBtn").style.display = "none";
        ["pName", "pPrice", "newCat", "pDesc", "pImage"].forEach(i => document.getElementById(i).value = "");
        lastImageUrl = "";
    }
</script>
</body>
</html>
