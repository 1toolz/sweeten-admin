<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مدير متجر Sweeten</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #38bdf8; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 20px; margin:0; }
        .container { max-width: 900px; margin: auto; display: none; } /* مخفي حتى تسجيل الدخول */
        
        /* نظام الدخول */
        #loginOverlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .login-box { background: var(--card); padding: 30px; border-radius: 12px; text-align: center; border: 1px solid #334155; }
        
        /* التنسيقات العامة */
        .form-section { background: var(--card); padding: 20px; border-radius: 12px; margin-bottom: 30px; border: 1px solid #334155; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { cursor: pointer; border: none; border-radius: 8px; font-weight: bold; padding: 12px; transition: 0.3s; }
        .btn-add { background: #22c55e; color: white; width: 100%; margin-top: 10px; }
        .btn-edit { background: #f59e0b; color: white; margin-left: 5px; }
        .btn-del { background: #ef4444; color: white; }

        .card { background: var(--card); border-radius: 10px; padding: 15px; margin-bottom: 15px; display: flex; gap: 15px; border: 1px solid #334155; }
        .card img { width: 100px; height: 100px; object-fit: cover; border-radius: 8px; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h2>ادخل كود الوصول السري</h2>
        <input type="password" id="passInput" placeholder="الكود هنا...">
        <button class="btn-add" onclick="checkPass()">دخول</button>
    </div>
</div>

<div class="container" id="adminPanel">
    <div class="form-section">
        <h2 id="formTitle">إضافة منتج جديد</h2>
        <input type="hidden" id="editId">
        <input type="text" id="pName" placeholder="اسم المنتج">
        <input type="number" id="pPrice" placeholder="السعر">
        
        <div style="display:flex; gap:10px;">
            <select id="pCategory"></select>
            <input type="text" id="newCategory" placeholder="أو أضف قسم جديد..." style="flex:1">
        </div>
        
        <input type="file" id="pImage" accept="image/*">
        <textarea id="pDesc" placeholder="الوصف"></textarea>
        <button class="btn-add" id="saveBtn" onclick="saveProduct()">حفظ المنتج</button>
        <button id="cancelEdit" style="display:none; background:#475569; color:white; width:100%; margin-top:5px;" onclick="resetForm()">إلغاء التعديل</button>
    </div>

    <h2>المنتجات الحالية</h2>
    <div id="productsList"></div>
</div>

<script>
    const API_URL = "رابط_السكريبت_الخاص_بك_هنا"; // استبدله برابط الـ /exec
    const SECRET_CODE = "1234"; // الكود السري الخاص بك
    let currentImage = "";

    function checkPass() {
        if (document.getElementById("passInput").value === SECRET_CODE) {
            document.getElementById("loginOverlay").style.display = "none";
            document.getElementById("adminPanel").style.display = "block";
            loadData();
        } else {
            alert("كود خاطئ!");
        }
    }

    async function loadData() {
        const res = await fetch(API_URL);
        const data = await res.json();
        
        // تحديث القائمة المنسدلة للأقسام
        const catSelect = document.getElementById("pCategory");
        catSelect.innerHTML = '<option value="">اختر قسم...</option>';
        data.categories.forEach(c => {
            catSelect.innerHTML += `<option value="${c}">${c}</option>`;
        });

        // عرض المنتجات
        const list = document.getElementById("productsList");
        list.innerHTML = "";
        data.products.forEach(p => {
            list.innerHTML += `
                <div class="card">
                    <img src="${p.image || ''}">
                    <div style="flex:1">
                        <h3>${p.name} - <small>${p.category}</small></h3>
                        <p class="price">${p.price} ج.م</p>
                        <button class="btn-edit" onclick='startEdit(${JSON.stringify(p)})'>تعديل</button>
                        <button class="btn-del" onclick="deleteProduct(${p.id})">حذف</button>
                    </div>
                </div>
            `;
        });
    }

    function startEdit(p) {
        document.getElementById("formTitle").innerText = "تعديل المنتج: " + p.name;
        document.getElementById("editId").value = p.id;
        document.getElementById("pName").value = p.name;
        document.getElementById("pPrice").value = p.price;
        document.getElementById("pCategory").value = p.category;
        document.getElementById("pDesc").value = p.description;
        currentImage = p.image; // نحتفظ بالصورة القديمة لو مغيرناهاش
        document.getElementById("cancelEdit").style.display = "block";
        document.getElementById("saveBtn").innerText = "تحديث البيانات";
        window.scrollTo(0,0);
    }

    async function saveProduct() {
        const id = document.getElementById("editId").value;
        const file = document.getElementById("pImage").files[0];
        const newCat = document.getElementById("newCategory").value;
        const category = newCat || document.getElementById("pCategory").value;
        
        document.getElementById("saveBtn").disabled = true;
        
        let imageUrl = currentImage;
        if (file) {
            // هنا تضع كود رفع Cloudinary الذي استخدمناه سابقاً
            imageUrl = await uploadToCloudinary(file); 
        }

        const payload = {
            action: id ? "edit" : "add",
            id: id,
            name: document.getElementById("pName").value,
            price: document.getElementById("pPrice").value,
            category: category,
            image: imageUrl,
            description: document.getElementById("pDesc").value
        };

        await fetch(API_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) });
        alert("تمت العملية بنجاح");
        resetForm();
        loadData();
    }

    function resetForm() {
        document.getElementById("formTitle").innerText = "إضافة منتج جديد";
        document.getElementById("editId").value = "";
        document.getElementById("saveBtn").innerText = "حفظ المنتج";
        document.getElementById("saveBtn").disabled = false;
        document.getElementById("cancelEdit").style.display = "none";
        ["pName", "pPrice", "newCategory", "pDesc", "pImage"].forEach(i => document.getElementById(i).value = "");
        currentImage = "";
    }

    // لا تنسَ إضافة وظيفة uploadToCloudinary هنا كما في الكود السابق
</script>
</body>
</html>
