<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweeten Admin | Pro System</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#eab308">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="#fff9f5">

    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Great+Vibes&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg-page: #fff9f5; --glass: rgba(255, 255, 255, 0.85);
            --text-dark: #452e1f; --brand-yellow: #eab308; 
            --brand-gold: #c5a044; --border-soft: #e9e1dc;
            --shadow: 0 10px 30px rgba(93, 58, 36, 0.08);
        }

        /* --- شاشة الترحيب الديناميكية --- */
        #splash {
            position: fixed; inset: 0; background: var(--bg-page);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; transition: transform 0.8s cubic-bezier(0.7, 0, 0.3, 1);
        }
        .gray-logo { width: 140px; filter: grayscale(100%); opacity: 0.5; animation: float 3s infinite ease-in-out; border-radius: 50%; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        /* --- مؤشر المعالجة الزجاجي --- */
        #uploadingOverlay {
            position: fixed; inset: 0; background: rgba(255, 249, 245, 0.7);
            backdrop-filter: blur(8px); display: none; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 9998;
        }

        body { 
            background: var(--bg-page); color: var(--text-dark); 
            font-family: 'Amiri', serif; margin: 0; padding: 15px; 
            min-height: 100vh; overflow-x: hidden;
        }
        
        .container { max-width: 850px; margin: auto; display: none; animation: fadeIn 0.8s ease; width: 100%; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* --- الإحصائيات التفاعلية --- */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 25px; }
        .stat-card { 
            background: var(--glass); padding: 18px; border-radius: 25px; text-align: center; 
            border: 1px solid white; box-shadow: var(--shadow); transition: 0.3s;
        }
        .stat-card span { display: block; font-size: 26px; font-weight: bold; color: var(--brand-gold); }
        .stat-card label { font-size: 13px; color: #8c7365; font-weight: bold; }

        /* --- الأزرار الذهبية الكبسولة --- */
        .btn-brand { 
            background: linear-gradient(135deg, var(--brand-yellow), var(--brand-gold));
            color: var(--text-dark); border: none; padding: 16px; 
            border-radius: 50px; font-weight: bold; font-size: 19px; 
            cursor: pointer; transition: 0.4s; width: 100%; margin-top: 15px;
            box-shadow: 0 10px 20px rgba(234, 179, 8, 0.2); font-family: 'Amiri', serif;
        }
        .btn-brand:hover { box-shadow: 0 15px 30px rgba(234, 179, 8, 0.35); transform: translateY(-3px); }

        /* --- الفورم --- */
        .form-section { 
            background: white; padding: 30px; border-radius: 30px; 
            border: 1px solid var(--border-soft); margin-bottom: 30px; box-shadow: var(--shadow);
        }
        input, select, textarea { 
            width: 100%; padding: 14px; margin: 10px 0; border-radius: 18px; 
            border: 1px solid var(--border-soft); background: #fdfaf8; 
            font-family: 'Amiri', serif; font-size: 16px; box-sizing: border-box;
        }

        /* --- كروت المنتجات --- */
        .card { 
            background: white; border-radius: 25px; padding: 18px; margin-bottom: 15px; 
            display: flex; gap: 18px; border: 1px solid var(--border-soft); 
            align-items: center; transition: 0.4s;
        }
        .card img { width: 80px; height: 80px; border-radius: 20px; object-fit: cover; }
        .badge { background: #fffbeb; color: var(--brand-gold); padding: 4px 14px; border-radius: 50px; font-size: 12px; font-weight: bold; border: 1px solid #fef3c7; }

        /* --- الدخول --- */
        #loginOverlay { position: fixed; inset: 0; background: var(--bg-page); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .login-box { background: white; padding: 45px; border-radius: 35px; text-align: center; width: 330px; box-shadow: 0 30px 60px rgba(0,0,0,0.1); }

        /* --- الختم المطور تحت خالص --- */
        footer { margin-top: 60px; padding: 30px 0; border-top: 1px solid var(--border-soft); display: flex; justify-content: center; background: #faf6f3; width: 100%; }
        .dev-stamp { display: flex; align-items: center; gap: 15px; text-decoration: none; color: var(--text-dark); transition: 0.3s; }
        .stamp-circle { width: 50px; height: 50px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; position: relative; border: 1px solid #ddd; }
        .stamp-circle::before { content: ''; position: absolute; top: 7px; left: 5px; width: 7px; height: 7px; background: var(--brand-yellow); border-radius: 50%; box-shadow: 0 0 10px var(--brand-yellow); }
        .stamp-initials { font-family: 'Great Vibes', cursive; font-size: 26px; color: #5d3a24; margin-top: -4px; }
        .dev-full-name { font-family: 'Dancing Script', cursive; font-size: 20px; color: var(--text-dark); font-weight: bold; }
        
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--brand-yellow); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="splash">
    <img src="https://scontent.fcai20-2.fna.fbcdn.net/v/t39.30808-6/427791635_122110701860207237_612968014316171595_n.jpg?_nc_cat=105&oe=69CFBDBD" class="gray-logo">
    <p style="color: #8c7365; font-weight: bold; letter-spacing: 2px;">SWEETEN YOUR LIFE</p>
</div>

<div id="uploadingOverlay">
    <div class="spinner"></div>
    <p style="margin-top:20px; font-weight:bold; font-size: 18px;">جاري تحديث عالمك الخاص...</p>
</div>

<div id="loginOverlay">
    <div class="login-box">
        <h2 style="color: var(--brand-gold);">مرحباً بك</h2>
        <p style="font-size:14px; color:#8c7365; margin-bottom: 25px;">سجل دخولك لإدارة متجر حلي حياتك</p>
        <input type="password" id="passInput" placeholder="الكود السري">
        <button class="btn-brand" onclick="login()">دخول النظام</button>
    </div>
</div>

<div class="container" id="app">
    <div class="stats-grid">
        <div class="stat-card"><span id="stat-total">0</span><label>منتج</label></div>
        <div class="stat-card"><span id="stat-cats">0</span><label>أقسام</label></div>
        <div class="stat-card"><span id="stat-max">0</span><label>أعلى سعر</label></div>
    </div>

    <div class="form-section">
        <h2 id="formTitle" style="margin-top:0">إضافة قطعة سكر جديدة 🍰</h2>
        <input type="hidden" id="editId">
        <div style="display:flex; gap:12px;"><input type="text" id="pName" placeholder="الاسم"><input type="number" id="pPrice" placeholder="السعر"></div>
        <div style="display:flex; gap:12px;"><select id="pCategory"></select><input type="text" id="newCat" placeholder="أو قسم جديد"></div>
        <input type="file" id="pImage" accept="image/*">
        <textarea id="pDesc" rows="2" placeholder="وصف المنتج (اختياري)"></textarea>
        <button class="btn-brand" id="saveBtn" onclick="save()">حفظ وتحديث المتجر</button>
        <button id="cancelBtn" onclick="resetForm()" style="display:none; width:100%; background:#94a3b8; color:white; border:none; padding:12px; margin-top:10px; border-radius:50px; cursor:pointer;">إلغاء التعديل</button>
    </div>

    <div style="margin-bottom: 20px;">
        <input type="text" id="searchInput" onkeyup="searchProducts()" placeholder="ابحث عن أي منتج بالاسم..." style="background: white; border-radius: 50px; padding-right: 25px;">
    </div>

    <div id="status" style="text-align:center; display:none; color:#8c7365;">جاري تحديث البيانات...</div>
    <div id="list"></div>
    
    <footer>
        <a href="https://www.facebook.com/abdoo.elbass" target="_blank" class="dev-stamp">
            <div class="stamp-circle"><span class="stamp-initials">a.</span></div>
            <div style="display:flex; flex-direction:column; align-items: flex-start;">
                <span style="font-size:9px; color:#8c7365; font-weight:bold;">DEVELOPED BY</span>
                <span class="dev-full-name">Abdulrahman Saeed Elbass</span>
            </div>
        </a>
    </footer>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbzh560dH73AznHozzIqzZtOaDGw0WOZMGEqsqipZMXuClGXFyqlKNOiSFCBkXaQoRXw/exec";
    const PASS = "2026";
    let allProducts = [];
    let lastImg = "";

    // التحكم في شاشة الترحيب
    window.onload = () => setTimeout(() => {
        document.getElementById('splash').style.transform = 'translateY(-100%)';
        setTimeout(() => document.getElementById('splash').style.display = 'none', 800);
    }, 2500);

    // تسجيل الـ Service Worker
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(err => console.log('SW Error', err));
    }

    function login() {
        if (document.getElementById("passInput").value === PASS) {
            document.getElementById("loginOverlay").style.display = "none";
            document.getElementById("app").style.display = "block";
            fetchData();
        } else alert("الكود غير صحيح!");
    }

    async function uploadCloudinary(file) {
        const fd = new FormData();
        fd.append("file", file);
        fd.append("upload_preset", "products_upload");
        const res = await fetch("https://api.cloudinary.com/v1_1/dw1k42gow/image/upload", {method:"POST", body:fd});
        const d = await res.json();
        return d.secure_url;
    }

    async function fetchData() {
        document.getElementById("status").style.display = "block";
        try {
            const r = await fetch(API);
            const data = await r.json();
            allProducts = data.products;
            
            document.getElementById("stat-total").innerText = allProducts.length;
            document.getElementById("stat-cats").innerText = data.categories.length;
            const prices = allProducts.map(p => parseFloat(p.price) || 0);
            document.getElementById("stat-max").innerText = (prices.length ? Math.max(...prices) : 0) + " ج";

            const sel = document.getElementById("pCategory");
            sel.innerHTML = '<option value="">اختر قسم...</option>';
            data.categories.forEach(c => sel.innerHTML += `<option value="${c}">${c}</option>`);

            renderList(allProducts);
        } finally { document.getElementById("status").style.display = "none"; }
    }

    function renderList(products) {
        const area = document.getElementById("list");
        area.innerHTML = products.slice().reverse().map(p => `
            <div class="card">
                <img src="${p.image || 'https://via.placeholder.com/80'}" onerror="this.src='https://via.placeholder.com/80'">
                <div style="flex:1">
                    <h4 style="margin:0">${p.name} <span class="badge">${p.category}</span></h4>
                    <p style="margin:5px 0; font-weight:bold; color:var(--brand-gold)">${p.price} ج.م</p>
                    <div style="display:flex; gap:15px;">
                        <button onclick='initEdit(${JSON.stringify(p)})' style="color:#d97706; background:none; border:none; cursor:pointer; font-family:'Amiri'; font-weight:bold;">تعديل</button>
                        <button onclick="handleDelete(${p.id})" style="color:#dc2626; background:none; border:none; cursor:pointer; font-family:'Amiri'; font-weight:bold;">حذف</button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function searchProducts() {
        const val = document.getElementById("searchInput").value.toLowerCase();
        const filtered = allProducts.filter(p => p.name.toLowerCase().includes(val));
        renderList(filtered);
    }

    async function save() {
        const overlay = document.getElementById("uploadingOverlay");
        const id = document.getElementById("editId").value;
        const file = document.getElementById("pImage").files[0];
        const cat = document.getElementById("newCat").value || document.getElementById("pCategory").value;

        if (!document.getElementById("pName").value || !cat) return alert("اكمل البيانات");

        overlay.style.display = "flex";
        try {
            let imgUrl = lastImg;
            if (file) imgUrl = await uploadCloudinary(file);

            const payload = {
                action: id ? "edit" : "add",
                id: id,
                name: document.getElementById("pName").value,
                price: document.getElementById("pPrice").value,
                category: cat,
                image: imgUrl,
                description: document.getElementById("pDesc").value
            };

            await fetch(API, {method:"POST", mode:"no-cors", body:JSON.stringify(payload)});
            resetForm(); fetchData();
        } catch(e) { alert("خطأ في الاتصال"); }
        finally { overlay.style.display = "none"; }
    }

    function initEdit(p) {
        document.getElementById("formTitle").innerText = "تعديل: " + p.name;
        document.getElementById("editId").value = p.id;
        document.getElementById("pName").value = p.name;
        document.getElementById("pPrice").value = p.price;
        document.getElementById("pCategory").value = p.category;
        document.getElementById("pDesc").value = p.description;
        lastImg = p.image;
        document.getElementById("cancelBtn").style.display = "block";
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    async function handleDelete(id) {
        if (!confirm("هل تريد الحذف؟")) return;
        document.getElementById("uploadingOverlay").style.display = "flex";
        await fetch(`${API}?action=delete&id=${id}`);
        fetchData();
        document.getElementById("uploadingOverlay").style.display = "none";
    }

    function resetForm() {
        document.getElementById("formTitle").innerText = "إضافة قطعة سكر جديدة 🍰";
        document.getElementById("editId").value = "";
        document.getElementById("cancelBtn").style.display = "none";
        ["pName", "pPrice", "newCat", "pDesc", "pImage"].forEach(i => document.getElementById(i).value = "");
        lastImg = "";
    }
</script>
</body>
</html>
